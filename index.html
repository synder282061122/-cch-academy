<meta name="apple-mobile-web-app-capable" content="yes">

<style>
:root{
 --navy:#0f4c5c;--navy2:#0a363f;--teal:#17a2a0;--gold:#d4a843;
 --sand:#f7f3ea;--white:#fff;--gray:#6b7280;--gl:#e5e7eb;
 --red:#dc2626;--green:#16a34a;--shadow:0 2px 12px rgba(15,76,92,.12);--r:14px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
body{font-family:'Segoe UI','Sarabun',sans-serif;background:var(--sand);color:#1f2937;}
input,textarea,select{font-family:inherit;}
button{font-family:inherit;cursor:pointer;}
.hidden{display:none!important;}

/* SPLASH */
#splash{position:fixed;inset:0;background:linear-gradient(135deg,var(--navy),var(--navy2));
 display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;}
.sp-logo{width:72px;height:72px;border-radius:18px;background:linear-gradient(135deg,var(--teal),var(--navy));
 display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:#fff;
 margin-bottom:16px;box-shadow:0 8px 24px rgba(0,0,0,.3);}
.sp-title{color:#fff;font-size:20px;font-weight:700;margin-bottom:6px;}
.sp-sub{color:rgba(255,255,255,.6);font-size:13px;margin-bottom:28px;}
.spinner{width:34px;height:34px;border:3px solid rgba(255,255,255,.2);border-top-color:var(--teal);
 border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* LOGIN */
#loginWrap{min-height:100vh;display:flex;align-items:center;justify-content:center;
 background:linear-gradient(135deg,var(--navy),var(--navy2));padding:20px;}
.loginBox{background:#fff;border-radius:20px;padding:36px 28px;width:100%;max-width:380px;
 box-shadow:0 10px 40px rgba(0,0,0,.3);text-align:center;}
.loginLogo{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,var(--teal),var(--navy));
 display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:24px;font-weight:800;color:#fff;}
.loginBox h1{font-size:22px;color:var(--navy);margin-bottom:4px;}
.loginBox .sub{color:var(--gray);font-size:13px;margin-bottom:20px;}
.langRow{display:flex;justify-content:center;gap:8px;margin-bottom:20px;}
.langBtn{padding:6px 18px;border-radius:20px;border:1.5px solid var(--gl);background:#fff;font-size:13px;font-weight:600;color:var(--gray);}
.langBtn.on{background:var(--teal);color:#fff;border-color:var(--teal);}
.iGroup{text-align:left;margin-bottom:14px;}
.iGroup label{display:block;font-size:12px;font-weight:600;color:var(--gray);margin-bottom:5px;}
.iGroup input{width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid var(--gl);font-size:15px;outline:none;}
.iGroup input:focus{border-color:var(--teal);}
.btnPrimary{width:100%;padding:13px;border-radius:10px;border:none;background:var(--teal);color:#fff;
 font-size:16px;font-weight:700;margin-top:8px;}
.errMsg{color:var(--red);font-size:13px;margin-top:10px;min-height:18px;}

/* TOP BAR */
#topBar{background:var(--navy);color:#fff;padding:12px 16px;display:flex;align-items:center;
 justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.15);}
.tbLeft{display:flex;align-items:center;gap:10px;}
.tbLogo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--teal),var(--gold));
 display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff;}
.tbTitle{font-size:15px;font-weight:700;}
.tbUser{font-size:11px;opacity:.8;}
.tbRight{display:flex;gap:8px;}
.iconBtn{background:rgba(255,255,255,.12);border:none;color:#fff;width:34px;height:34px;
 border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;}

/* BOTTOM NAV */
#btmNav{position:sticky;bottom:0;background:#fff;display:flex;border-top:1px solid var(--gl);
 box-shadow:0 -2px 10px rgba(0,0,0,.06);z-index:50;}
.navBtn{flex:1;padding:9px 4px 8px;border:none;background:none;display:flex;flex-direction:column;
 align-items:center;gap:3px;color:var(--gray);font-size:10.5px;font-weight:600;}
.navBtn .ni{font-size:19px;}
.navBtn.on{color:var(--teal);}

#mainContent{flex:1;padding:16px;padding-bottom:24px;max-width:760px;margin:0 auto;width:100%;}
#app{min-height:100vh;display:flex;flex-direction:column;}

/* CARDS */
.card{background:#fff;border-radius:var(--r);padding:18px;box-shadow:var(--shadow);margin-bottom:14px;}
.secTitle{font-size:17px;font-weight:700;color:var(--navy);margin-bottom:14px;}
.deptGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
@media(min-width:500px){.deptGrid{grid-template-columns:repeat(3,1fr);}}
.deptCard{background:#fff;border-radius:14px;padding:18px 12px;text-align:center;
 box-shadow:var(--shadow);border:2px solid transparent;cursor:pointer;}
.deptCard:active{transform:scale(.96);border-color:var(--teal);}
.deptIcon{font-size:28px;margin-bottom:8px;width:64px;height:64px;border-radius:12px;object-fit:cover;display:block;margin:0 auto 8px;}
.deptIconText{font-size:28px;margin-bottom:8px;}
.deptName{font-size:13px;font-weight:700;color:var(--navy);}
.deptCount{font-size:11px;color:var(--gray);margin-top:2px;}

.courseRow{display:flex;align-items:center;gap:12px;padding:14px 10px;border-radius:12px;
 background:#fff;box-shadow:var(--shadow);margin-bottom:10px;cursor:pointer;}
.cCheck{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;
 font-size:13px;flex-shrink:0;font-weight:700;}
.cCheck.done{background:var(--green);color:#fff;}
.cCheck.pend{background:var(--gl);color:var(--gray);}
.cInfo{flex:1;min-width:0;}
.cTitle{font-size:14px;font-weight:700;color:#1f2937;margin-bottom:3px;}
.cMeta{font-size:11.5px;color:var(--gray);}
.pbar{height:5px;background:var(--gl);border-radius:3px;margin-top:6px;overflow:hidden;}
.pbar-in{height:100%;background:var(--teal);border-radius:3px;transition:width .3s;}

/* BUTTONS */
.btn{padding:10px 18px;border-radius:10px;border:none;font-weight:700;font-size:14px;cursor:pointer;}
.btn-teal{background:var(--teal);color:#fff;}
.btn-gold{background:var(--gold);color:#fff;}
.btn-gray{background:var(--gl);color:#374151;}
.btn-red{background:var(--red);color:#fff;}
.btn-outline{background:#fff;border:1.5px solid var(--teal);color:var(--teal);}
.btn-block{width:100%;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.backBtn{display:flex;align-items:center;gap:6px;color:var(--teal);font-weight:700;
 font-size:14px;margin-bottom:14px;background:none;border:none;padding:0;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;
 justify-content:center;z-index:300;padding:20px;}
.mBox{background:#fff;border-radius:18px;padding:24px;max-width:440px;width:100%;
 max-height:88vh;overflow-y:auto;}
.mBox.danger{border-top:6px solid var(--red);}
.mTitle{font-size:18px;font-weight:800;margin-bottom:10px;}
.mTitle.red{color:var(--red);}
.mText{font-size:14px;color:#374151;line-height:1.6;margin-bottom:18px;}
.mActions{display:flex;gap:10px;}
.mActions .btn{flex:1;}
.iGroup select,.iGroup textarea{width:100%;padding:12px 14px;border-radius:10px;
 border:1.5px solid var(--gl);font-size:14px;outline:none;background:#fff;}
.iGroup select:focus,.iGroup textarea:focus,.iGroup input:focus{border-color:var(--teal);}
.iGroup textarea{resize:vertical;min-height:70px;}
.fGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fGrid .full{grid-column:1/-1;}

/* VIDEO */
.vWrap{position:relative;width:100%;aspect-ratio:16/9;background:#000;border-radius:14px;overflow:hidden;margin-bottom:14px;}
.vWrap iframe{width:100%;height:100%;border:none;}
.wStat{display:flex;justify-content:space-between;font-size:12px;color:var(--gray);margin-bottom:8px;}

/* EXAM */
.examHdr{display:flex;justify-content:space-between;align-items:center;background:var(--navy);
 color:#fff;padding:14px 16px;border-radius:14px;margin-bottom:16px;}
.timerBox{background:rgba(255,255,255,.15);padding:6px 14px;border-radius:20px;
 font-weight:800;font-size:16px;font-variant-numeric:tabular-nums;}
.timerBox.warn{background:var(--red);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.6;}}
.choiceBtn{display:block;width:100%;text-align:left;padding:13px 16px;border-radius:12px;
 border:1.5px solid var(--gl);background:#fff;font-size:14px;margin-bottom:10px;font-weight:500;cursor:pointer;}
.choiceBtn.sel{border-color:var(--teal);background:#e6f7f7;font-weight:700;}
.choiceBtn.ok{border-color:var(--green);background:#e9f9ee;}
.choiceBtn.no{border-color:var(--red);background:#fdecec;}

/* HISTORY */
.statGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.statBox{background:#fff;border-radius:14px;padding:14px 8px;text-align:center;box-shadow:var(--shadow);}
.statNum{font-size:22px;font-weight:800;color:var(--navy);}
.statLbl{font-size:10.5px;color:var(--gray);margin-top:2px;}
.hRow{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;
 background:#fff;border-radius:12px;box-shadow:var(--shadow);margin-bottom:8px;}
.hLeft{flex:1;min-width:0;}
.hTitle{font-size:13.5px;font-weight:700;}
.hMeta{font-size:11px;color:var(--gray);margin-top:2px;}
.badge{font-size:10.5px;font-weight:800;padding:4px 9px;border-radius:20px;white-space:nowrap;}
.badge.pass{background:#dcfce7;color:var(--green);}
.badge.fail{background:#fee2e2;color:var(--red);}
.badge.prog{background:#fef3c7;color:#b45309;}

/* ADMIN */
.aTabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:16px;padding-bottom:4px;}
.aTab{flex-shrink:0;padding:8px 14px;border-radius:20px;border:1.5px solid var(--gl);
 background:#fff;font-size:12.5px;font-weight:700;color:var(--gray);white-space:nowrap;cursor:pointer;}
.aTab.on{background:var(--navy);color:#fff;border-color:var(--navy);}
.tWrap{overflow-x:auto;border-radius:12px;box-shadow:var(--shadow);background:#fff;}
table.dt{width:100%;border-collapse:collapse;font-size:12.5px;}
table.dt th{background:var(--sand);padding:8px 6px;text-align:left;font-weight:700;color:var(--navy);}
table.dt td{padding:8px 6px;border-bottom:1px solid var(--gl);}
.miniBtn{padding:5px 10px;border-radius:8px;border:none;font-size:11.5px;font-weight:700;cursor:pointer;margin-left:3px;}
.cheatTag{display:inline-block;background:var(--red);color:#fff;font-size:10px;
 font-weight:800;padding:3px 8px;border-radius:6px;margin-left:4px;}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1f2937;
 color:#fff;padding:12px 20px;border-radius:30px;font-size:13px;font-weight:600;
 z-index:400;box-shadow:0 4px 16px rgba(0,0,0,.25);max-width:90%;text-align:center;pointer-events:none;}
.syncBox{background:var(--sand);border-radius:10px;padding:12px;font-size:12px;color:var(--gray);margin-top:8px;}
</style>
</head>

/* ============================================================
 UTILS
 ============================================================ */
function toast(msg,ms=2600){
 const el=document.createElement('div');el.className='toast';el.textContent=msg;
 document.body.appendChild(el);setTimeout(()=>el.remove(),ms);
}
function esc(s){
 if(s==null)return'';
 return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function fmtTime(s){s=Math.floor(s||0);return`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;}
function fmtDate(ts){
 if(!ts)return'-';
 return new Date(ts).toLocaleString(LANG==='th'?'th-TH':'en-GB',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
}

/* ============================================================
 AUTH
 ============================================================ */
function hideSplash(){
 const s=document.getElementById('splash');
 if(!s)return;
 s.style.transition='opacity .3s';s.style.opacity='0';
 setTimeout(()=>s.remove(),320);
}
function showLogin(){
 hideSplash();
 document.getElementById('loginWrap').classList.remove('hidden');
}
function tryAutoLogin(){
 const u=localStorage.getItem(SK);
 if(!u){showLogin();return;}
 db.ref('users/'+u).once('value').then(snap=>{
 const d=snap.val();
 if(d&&d.active!==false){d.username=u;ST.user=d;enterApp();}
 else{localStorage.removeItem(SK);showLogin();}
 }).catch(()=>showLogin());
}
function doLogin(){
 const u=document.getElementById('lUser').value.trim();
 const p=document.getElementById('lPass').value;
 const err=document.getElementById('lErr');
 err.textContent='';
 if(!u||!p){err.textContent=t('field_required');return;}
 const btn=document.getElementById('lBtn');btn.disabled=true;
 db.ref('users/'+u).once('value').then(snap=>{
 btn.disabled=false;
 const d=snap.val();
 if(!d||d.password!==p){err.textContent=t('err_login');return;}
 if(d.active===false){err.textContent=t('err_inactive');return;}
 d.username=u;ST.user=d;
 localStorage.setItem(SK,u);
 enterApp();
 }).catch(e=>{btn.disabled=false;err.textContent=t('err_login');});
}
function doLogout(){
 detachExamGuards();
 localStorage.removeItem(SK);ST.user=null;ST.page='lessons';
 document.getElementById('app').classList.add('hidden');
 document.getElementById('loginWrap').classList.remove('hidden');
 document.getElementById('lUser').value='';document.getElementById('lPass').value='';
}
function enterApp(){
 hideSplash();
 document.getElementById('loginWrap').classList.add('hidden');
 document.getElementById('app').classList.remove('hidden');
 document.getElementById('tbUser').textContent=LANG==='th'?(ST.user.nameTH||ST.user.username):(ST.user.nameEN||ST.user.username);
 document.getElementById('nAdmin').classList.toggle('hidden',ST.user.role!=='admin');

 goPage('lessons');

 db.ref('departments').on('value',s=>{ST.departments=s.val()||{};if(['lessons','admin'].includes(ST.page))renderPage();});

 db.ref('progress/'+ST.user.username).on('value',s=>{ST.progress[ST.user.username]=s.val()||{};if(['lessons','history'].includes(ST.page)&&!ST.currentCourse)renderPage();});
 db.ref('examLogs/'+ST.user.username).on('value',s=>{ST.examLogs[ST.user.username]=s.val()||{};if(ST.page==='history')renderPage();});
 if(ST.user.role==='admin'){
 db.ref('users').on('value',s=>{ST.users=s.val()||{};if(ST.page==='admin')renderPage();});
 db.ref('cheatLog').on('value',s=>{ST.cheatLog=s.val()||{};if(ST.page==='admin')renderPage();});
 db.ref('progress').on('value',s=>{ST.progress=s.val()||{};if(['admin','history'].includes(ST.page))renderPage();});
 db.ref('examLogs').on('value',s=>{ST.examLogs=s.val()||{};if(ST.page==='admin')renderPage();});
 }
}

 LESSONS

function renderLessons(c){
 if(ST.currentCourse)return renderCourseDetail(c);
 if(ST.currentDept)return renderCourseList(c);

}
function deptCourses(deptId){
 const m=ST.courses[deptId]||{};
 return Object.keys(m).map(id=>({id,...m[id]})).filter(x=>x.active!==false).sort((a,b)=>(a.order||0)-(b.order||0));
}
function renderDeptGrid(c){
 const depts=Object.keys(ST.departments).map(id=>({id,...ST.departments[id]})).sort((a,b)=>(a.order||0)-(b.order||0));
 let h=`<div class="secTitle">${t('select_dept')}</div><div class="deptGrid">`;
 if(!depts.length)h+=`<div class="card" style="grid-column:1/-1;text-align:center;color:var(--gray);">${t('no_courses')}</div>`;
 depts.forEach(d=>{
 const n=deptCourses(d.id).length;
 const dImg=d.imageUrl
   ?`<img class="deptIcon" src="${esc(d.imageUrl)}" alt="" onerror="this.style.display='none'">`
   :`<div class="deptIconText">${esc(d.icon||'')}</div>`;
 h+=`<div class="deptCard" onclick="ST.currentDept='${d.id}';renderPage();">
 ${dImg}
 <div class="deptName">${esc(LANG==='th'?d.nameTH:d.nameEN)}</div>
 <div class="deptCount">${n} ${t('courses_count')}</div>
 </div>`;
 });
 c.innerHTML=h+'</div>';
}
function renderCourseList(c){
 const dept=ST.departments[ST.currentDept]||{};
 const courses=deptCourses(ST.currentDept);
 const myP=(ST.progress[ST.user.username])||{};
 let h=`<button class="backBtn" onclick="ST.currentDept=null;renderPage();">< ${t('back')}</button>`;
 h+=`<div class="secTitle">${dept.icon||''} ${esc(LANG==='th'?dept.nameTH:dept.nameEN)}</div>`;
 if(!courses.length)h+=`<div class="card" style="text-align:center;color:var(--gray);">${t('no_courses')}</div>`;
 courses.forEach(course=>{
 const p=myP[course.id]||{};
 const pct=Math.min(100,Math.round(p.percent||0));
 const done=!!p.examPassed;
 const icon=done?'V':(pct>0?pct+'%':'--');
 h+=`<div class="courseRow" onclick="ST.currentCourse='${course.id}';renderPage();">
 <div class="cCheck ${done?'done':'pend'}">${icon}</div>
 <div class="cInfo">
 <div class="cTitle">${esc(LANG==='th'?course.titleTH:course.titleEN)}</div>
 <div class="cMeta">${done?t('completed'):(pct>0?t('in_progress'):t('not_started'))}</div>
 <div class="pbar"><div class="pbar-in" style="width:${pct}%"></div></div>
 </div>
 <div style="color:var(--gl);font-size:18px;">></div>
 </div>`;
 });
 c.innerHTML=h;
}

/* ============================================================
 COURSE DETAIL & VIDEO TRACKING
 ============================================================ */
let vidTimer=null,vidSec=0;
function findCourse(id){
 for(const dk in ST.courses){if(ST.courses[dk][id])return{...ST.courses[dk][id],id,deptId:dk};}return null;
}
function renderCourseDetail(c){
 const course=findCourse(ST.currentCourse);
 if(!course){ST.currentCourse=null;ST.currentDept=null;renderPage();return;}
 const p=(ST.progress[ST.user.username]||{})[course.id]||{};
 const pct=Math.min(100,Math.round(p.percent||0));
 const unlocked=pct>=60,passed=!!p.examPassed;
 let h=`<button class="backBtn" onclick="stopVid();ST.currentCourse=null;renderPage();">< ${t('back')}</button>`;
 h+=`<div class="secTitle">${esc(LANG==='th'?course.titleTH:course.titleEN)}</div>`;
 h+=`<div class="vWrap"><iframe id="vIframe" src="https://drive.google.com/file/d/${esc(course.driveFileId)}/preview" allow="autoplay" allowfullscreen></iframe></div>`;
 h+=`<div class="wStat"><span>${t('progress_pct')}: <b id="pctLbl">${pct}%</b></span><span>${t('video_note')}</span></div>`;
 h+=`<div class="pbar" style="height:8px;margin-bottom:18px;"><div class="pbar-in" id="pctBar" style="width:${pct}%"></div></div>`;
 if(passed){
 h+=`<div class="card" style="text-align:center;padding:20px;">
 <div style="font-size:28px;font-weight:800;color:var(--green);">V</div>
 <div style="font-weight:700;color:var(--green);margin-top:4px;">${t('exam_passed')}</div></div>`;
 }else{
 // ใช้ id เพื่อ toggle โดยไม่ reload iframe
 h+=`<button id="examUnlockBtn" class="btn btn-teal btn-block" onclick="openExamIntro('${course.id}')" style="${unlocked?'':'display:none;'}">${t('take_exam')}</button>`;
 h+=`<button id="examLockBtn" class="btn btn-gray btn-block" disabled style="${unlocked?'display:none;':''}">${t('exam_locked')}</button>`;
 }
 c.innerHTML=h;
 startVid(course.id,course.durationSec||600,p.watchedSec||0);
}
function startVid(cid,dur,already){
 stopVid();vidSec=already;
 let examUnlocked = already >= dur*0.6;
 vidTimer=setInterval(()=>{
 vidSec=Math.min(dur,vidSec+1);
 const pct=dur>0?Math.min(100,(vidSec/dur)*100):0;
 // อัปเดต DOM เฉพาะ label และ progress bar เท่านั้น — ไม่แตะ iframe
 const bl=document.getElementById('pctLbl');
 const bb=document.getElementById('pctBar');
 if(bl)bl.textContent=Math.round(pct)+'%';
 if(bb)bb.style.width=pct+'%';
 // save ทุก 10 วินาที (ลด Firebase write)
 if(vidSec%10===0)saveVidProg(cid,vidSec,pct);
 // unlock exam button โดยไม่ reload iframe
 if(pct>=60&&!examUnlocked){
 examUnlocked=true;
 saveVidProg(cid,vidSec,pct); // save ทันทีตอน unlock
 const lockBtn=document.getElementById('examLockBtn');
 const unlockBtn=document.getElementById('examUnlockBtn');
 if(lockBtn)lockBtn.style.display='none';
 if(unlockBtn)unlockBtn.style.display='block';
 }
 },1000);
}
function stopVid(){if(vidTimer){clearInterval(vidTimer);vidTimer=null;}}
function saveVidProg(cid,ws,pct){
 db.ref(`progress/${ST.user.username}/${cid}`).update({watchedSec:Math.round(ws),percent:Math.round(pct*10)/10,completed:pct>=60,lastUpdated:firebase.database.ServerValue.TIMESTAMP});
}

 EXAM ENGINE

function openExamIntro(cid){
 const m=document.createElement('div');m.className='overlay';m.id='examIntroModal';
 m.innerHTML=`<div class="mBox"><div class="mTitle">${t('exam_instructions')}</div>
 <div class="mText" style="text-align:left;">
 - ${t('exam_rule1')}<br>- ${t('exam_rule2')}<br>- ${t('exam_rule3')}<br>- ${t('exam_rule4')}<br>- ${t('exam_rule5')}
 </div>
 <div class="mActions">
 <button class="btn btn-gray" onclick="document.getElementById('examIntroModal').remove()">${t('cancel')}</button>
 <button class="btn btn-teal" onclick="document.getElementById('examIntroModal').remove();startExam('${cid}')">${t('begin')}</button>
 </div></div>`;
 document.body.appendChild(m);
}
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
function startExam(cid){
 const bank=ST.questionBanks[cid]||{};
 let all=Object.keys(bank).map(id=>({id,...bank[id]}));
 if(!all.length){toast(LANG==='th'?'ยังไม่มีคำถาม':'No questions yet');return;}
 const picked=shuffle(all).slice(0,Math.min(10,all.length));
 const qs=picked.map(q=>{
 if(q.type==='truefalse')return{...q,choicesSh:LANG==='th'?['ถูก','ผิด']:['True','False'],correctSh:q.correctIndex};
 const idx=q.choicesTH.map((_,i)=>i);
 const si=shuffle(idx);
 return{...q,chTH:si.map(i=>q.choicesTH[i]),chEN:si.map(i=>q.choicesEN[i]),correctSh:si.indexOf(q.correctIndex)};
 });
 ST.examSession={cid,qs,cur:0,ans:new Array(qs.length).fill(null),tabs:0,cheat:false,t0:Date.now(),tUsed:0,qtimer:null,left:20};
 attachExamGuards();renderExamQ();
}
function renderExamQ(){
 const c=document.getElementById('mainContent'),s=ST.examSession,q=s.qs[s.cur];
 s.left=20;
 let choices='';
 if(q.type==='truefalse'){
 q.choicesSh.forEach((ch,i)=>{choices+=`<button class="choiceBtn${s.ans[s.cur]===i?' sel':''}" onclick="pickAns(${i})">${esc(ch)}</button>`;});
 }else{
 const chs=LANG==='th'?q.chTH:q.chEN;
 chs.forEach((ch,i)=>{choices+=`<button class="choiceBtn${s.ans[s.cur]===i?' sel':''}" onclick="pickAns(${i})">${String.fromCharCode(65+i)}. ${esc(ch)}</button>`;});
 }
 c.innerHTML=`<div class="examHdr">
 <div style="font-size:12px;opacity:.85;">${t('exam_result')} ${s.cur+1}/${s.qs.length}</div>
 <div class="timerBox" id="qTimer">${s.left}</div>
 </div>
 <div style="background:#fff;border-radius:16px;padding:20px;box-shadow:var(--shadow);">
 <div style="font-size:16px;font-weight:700;margin-bottom:18px;line-height:1.5;">${esc(LANG==='th'?q.questionTH:q.questionEN)}</div>
 <div id="choicesWrap">${choices}</div>
 </div>
 <div style="margin-top:16px;">
 <button class="btn btn-teal btn-block" id="nextBtn" onclick="nextQ()" ${s.ans[s.cur]===null?'disabled':''}>
 ${s.cur===s.qs.length-1?t('submit_exam'):'->'}
 </button>
 </div>`;
 startQTimer();
}
function pickAns(i){
 ST.examSession.ans[ST.examSession.cur]=i;
 document.querySelectorAll('#choicesWrap .choiceBtn').forEach((b,j)=>b.classList.toggle('sel',j===i));
 document.getElementById('nextBtn').disabled=false;
}
function startQTimer(){
 const s=ST.examSession;clearInterval(s.qtimer);
 s.qtimer=setInterval(()=>{
 s.left--;s.tUsed++;
 const el=document.getElementById('qTimer');
 if(el){el.textContent=s.left;el.classList.toggle('warn',s.left<=5);}
 if(s.left<=0){clearInterval(s.qtimer);nextQ(true);}
 },1000);
}
function nextQ(forced){
 clearInterval(ST.examSession.qtimer);
 const s=ST.examSession;
 if(!forced&&s.ans[s.cur]===null)return;
 if(s.cur<s.qs.length-1){s.cur++;renderExamQ();}
 else showConfirmSubmit();
}
function showConfirmSubmit(){
 const m=document.createElement('div');m.className='overlay';m.id='confirmModal';
 m.innerHTML=`<div class="mBox"><div class="mTitle">${t('confirm_submit')}</div>
 <div class="mText">${t('confirm_submit_text')}</div>
 <div class="mActions">
 <button class="btn btn-gray" onclick="document.getElementById('confirmModal').remove()">${t('no_back')}</button>
 <button class="btn btn-teal" onclick="document.getElementById('confirmModal').remove();submitExam()">${t('yes_submit')}</button>
 </div></div>`;
 document.body.appendChild(m);
}
function submitExam(){
 const s=ST.examSession;clearInterval(s.qtimer);detachExamGuards();
 let correct=0;
 s.qs.forEach((q,i)=>{if(s.ans[i]===q.correctSh)correct++;});
 const score=Math.round((correct/s.qs.length)*100);
 const passed=!s.cheat&&score>=80;
 db.ref(`examLogs/${ST.user.username}/${s.cid}/${genId()}`).set({score,totalQ:s.qs.length,correct,tUsed:s.tUsed,passed,tabSw:s.tabs,cheat:s.cheat,ts:firebase.database.ServerValue.TIMESTAMP});
 db.ref(`progress/${ST.user.username}/${s.cid}`).once('value').then(snap=>{
 const cur=snap.val()||{};
 const attempts=(cur.examAttempts||0)+1;
 let fs=(cur.failStreak||0);
 if(passed){
 db.ref(`progress/${ST.user.username}/${s.cid}`).update({examPassed:true,examAttempts:attempts,bestScore:Math.max(cur.bestScore||0,score),failStreak:0,lastUpdated:firebase.database.ServerValue.TIMESTAMP});
 }else{
 fs++;
 if(fs>=2||s.cheat){
 db.ref(`progress/${ST.user.username}/${s.cid}`).update({examAttempts:attempts,failStreak:0,watchedSec:0,percent:0,completed:false,lastUpdated:firebase.database.ServerValue.TIMESTAMP});
 }else{
 db.ref(`progress/${ST.user.username}/${s.cid}`).update({examAttempts:attempts,failStreak:fs,lastUpdated:firebase.database.ServerValue.TIMESTAMP});
 }
 }
 showExamResult(score,passed,correct,s.qs.length,!passed&&fs>=2);
 });
 // sync to google sheet if url set
 syncExamResultToSheet(s.cid,score,passed,correct,s.qs.length,s.tUsed,s.tabs,s.cheat);
}
function showExamResult(score,passed,correct,total,wasReset){
 const c=document.getElementById('mainContent');
 c.innerHTML=`<div class="card" style="text-align:center;padding:32px 20px;">
 <div style="font-size:46px;">${passed?':)':':('}</div>
 <div style="font-size:18px;font-weight:800;color:${passed?'var(--green)':'var(--red)'};margin:10px 0 4px;">${passed?t('pass'):t('fail')}</div>
 <div style="font-size:13px;color:var(--gray);margin-bottom:18px;">${t('exam_result')}</div>
 <div style="font-size:38px;font-weight:800;color:var(--navy);">${score}%</div>
 <div style="font-size:13px;color:var(--gray);margin-bottom:20px;">${correct}/${total} ${t('your_score')}</div>
 ${wasReset?`<div style="color:var(--red);font-weight:700;font-size:13px;margin-bottom:16px;">${t('reset_text')}</div>`:''}
 <button class="btn btn-teal btn-block" onclick="ST.currentCourse=null;goPage('lessons')">${t('back_lessons')}</button>
 </div>`;
}

/* ============================================================
 ANTI-CHEAT
 ============================================================ */
let cheatBound=false,lastBlur=0;
function attachExamGuards(){
 if(cheatBound)return;cheatBound=true;
 document.addEventListener('visibilitychange',onVisChange);
 window.addEventListener('blur',onBlur);
 document.addEventListener('contextmenu',blockCtx);
 document.addEventListener('copy',blockCopy);
 document.addEventListener('cut',blockCopy);
 document.addEventListener('keydown',blockKeys);
}
function detachExamGuards(){
 if(!cheatBound)return;cheatBound=false;
 document.removeEventListener('visibilitychange',onVisChange);
 window.removeEventListener('blur',onBlur);
 document.removeEventListener('contextmenu',blockCtx);
 document.removeEventListener('copy',blockCopy);
 document.removeEventListener('cut',blockCopy);
 document.removeEventListener('keydown',blockKeys);
}
function blockCtx(e){if(ST.examSession)e.preventDefault();}
function blockCopy(e){if(ST.examSession)e.preventDefault();}
function blockKeys(e){if(!ST.examSession)return;const k=e.key.toLowerCase();if((e.ctrlKey||e.metaKey)&&['c','x','u','s','p'].includes(k))e.preventDefault();if(k==='f12')e.preventDefault();}
function onBlur(){if(!ST.examSession)return;const n=Date.now();if(n-lastBlur<1500)return;lastBlur=n;onTabSwitch();}
function onVisChange(){if(!ST.examSession)return;if(document.hidden)onTabSwitch();}
function onTabSwitch(){
 const s=ST.examSession;if(!s)return;
 const n=Date.now();if(n-lastBlur<1500)return;lastBlur=n;
 s.tabs++;
 db.ref(`cheatLog/${genId()}`).set({username:ST.user.username,nameTH:ST.user.nameTH||'',nameEN:ST.user.nameEN||'',cid:s.cid,type:s.tabs>=2?'auto_fail':'warning',ts:firebase.database.ServerValue.TIMESTAMP});
 if(s.tabs===1)showTabWarn();
 else if(s.tabs>=2){s.cheat=true;showCheatFail();}
}
function showTabWarn(){
 clearInterval(ST.examSession.qtimer);
 const m=document.createElement('div');m.className='overlay';m.id='twModal';
 m.innerHTML=`<div class="mBox danger">

 <div class="mActions"><button class="btn btn-red btn-block" onclick="document.getElementById('twModal').remove();startQTimer()">${t('ack')}</button></div>
 </div>`;
 document.body.appendChild(m);
}

/* ============================================================
 HISTORY PAGE
 ============================================================ */
function getRequiredCourses(user){
 const r=[];
 Object.keys(ST.courses).forEach(dk=>{
 Object.keys(ST.courses[dk]).forEach(cid=>{
 const c=ST.courses[dk][cid];
 if(c.active===false)return;
 const rl=c.requiredLevel||[];
 const rd=c.requiredDept||[];
 const md=!rd.length||rd.includes(user.department)||rd.includes('ALL');
 const ml=!rl.length||rl.includes(user.level)||rl.includes('ALL');
 if(md&&ml)r.push({...c,id:cid,deptId:dk});
 });
 });
 return r;
}
function renderHistory(c){
 const req=getRequiredCourses(ST.user);
 const myP=ST.progress[ST.user.username]||{};
 const myE=ST.examLogs[ST.user.username]||{};
 const done=req.filter(x=>(myP[x.id]||{}).examPassed).length;
 const pct=req.length?Math.round((done/req.length)*100):0;
 let h=`<div class="secTitle">${t('history_title')}</div>
 <div class="statGrid">
 <div class="statBox"><div class="statNum">${req.length}</div><div class="statLbl">${t('total_required')}</div></div>
 <div class="statBox"><div class="statNum" style="color:var(--green);">${done}</div><div class="statLbl">${t('total_completed')}</div></div>
 <div class="statBox"><div class="statNum" style="color:var(--teal);">${pct}%</div><div class="statLbl">${t('total_pct')}</div></div>
 </div>`;
 if(!req.length){h+=`<div class="card" style="text-align:center;color:var(--gray);">${t('no_history')}</div>`;}
 req.forEach(course=>{
 const p=myP[course.id]||{};
 const atts=Object.values(myE[course.id]||{}).sort((a,b)=>(b.ts||0)-(a.ts||0));
 const last=atts[0]||{};
 const pw=!!p.examPassed;
 const bClass=pw?'pass':(last.ts&&!last.passed?'fail':'prog');
 const bTxt=pw?t('pass'):(last.ts&&!last.passed?t('fail'):t('in_progress'));
 h+=`<div class="hRow">
 <div class="hLeft">
 <div class="hTitle">${esc(LANG==='th'?course.titleTH:course.titleEN)}</div>
 <div class="hMeta">${t('progress_pct')}: ${Math.round(p.percent||0)}%${last.ts?` | ${t('attempts')}: ${atts.length} | ${t('time_used')}: ${fmtTime(last.tUsed)}`:''}</div>
 </div>
 <span class="badge ${bClass}">${bTxt}</span>
 </div>`;
 });
 c.innerHTML=h;
}

function saveCourse(deptId,existingCourseId){
 const tTH=document.getElementById('c_tTH').value.trim();
 const tEN=document.getElementById('c_tEN').value.trim();
 let did=document.getElementById('c_did').value.trim();
 const dur=parseInt(document.getElementById('c_dur').value)||600;
 const rl=Array.from(document.getElementById('c_rl').selectedOptions).map(o=>o.value);
 if(!tTH||!tEN||!did){toast(t('field_required'));return;}
 // auto-extract Drive file ID from full URL if pasted
 const m=did.match(/\/d\/([a-zA-Z0-9_-]+)/);
 if(m)did=m[1];
 const id=existingCourseId!=='null'&&existingCourseId?existingCourseId:genId();
 const exOrder=existingCourseId!=='null'&&existingCourseId?((ST.courses[deptId]||{})[existingCourseId]?.order||0):deptCourses(deptId).length;
 db.ref(`courses/${deptId}/${id}`).set({titleTH:tTH,titleEN:tEN,driveFileId:did,durationSec:dur,requiredLevel:rl,requiredDept:[deptId],order:exOrder,active:true})
 .then(()=>{closeModal();toast(t('save')+' OK');});
}

 if(type==='mc'){

 const cEN=[0,1,2,3].map(i=>document.getElementById('q_cEN'+i).value.trim());

 data.choicesTH=cTH;data.choicesEN=cEN;

 h+=`<div class="tWrap"><table class="dt"><thead><tr>
 <th>${t('nameTH')}</th><th>Course</th><th>Type</th><th>Time</th>
 </tr></thead><tbody>`;
 logs.forEach(l=>{
 const course=findCourse(l.cid)||{};
 h+=`<tr>
 <td>${esc(LANG==='th'?l.nameTH:l.nameEN)}</td>
 <td>${esc(LANG==='th'?(course.titleTH||l.cid):(course.titleEN||l.cid))}</td>
 <td>${l.type==='auto_fail'?`<span class="cheatTag">CHEAT</span>`:'Warning'}</td>
 <td>${fmtDate(l.ts)}</td>
 </tr>`;
 });
 h+=`</tbody></table></div>`;
 // exam attempts
 const atts=[];
 Object.keys(ST.examLogs).forEach(un=>{
 Object.keys(ST.examLogs[un]||{}).forEach(cid=>{
 Object.values(ST.examLogs[un][cid]).forEach(a=>atts.push({un,cid,...a}));
 });
 });
 atts.sort((a,b)=>(b.ts||0)-(a.ts||0));
 h+=`<div class="secTitle" style="font-size:14px;margin-top:20px;">All Exam Attempts</div>
 <div class="tWrap"><table class="dt"><thead><tr>
 <th>Staff</th><th>Course</th><th>Score</th><th>Time</th><th>Tabs</th><th>Result</th>
 </tr></thead><tbody>`;
 atts.slice(0,100).forEach(a=>{
 const u=ST.users[a.un]||{};const cr=findCourse(a.cid)||{};
 h+=`<tr>
 <td>${esc(LANG==='th'?(u.nameTH||a.un):(u.nameEN||a.un))}</td>
 <td>${esc(LANG==='th'?(cr.titleTH||a.cid):(cr.titleEN||a.cid))}</td>
 <td>${a.score}%</td><td>${fmtTime(a.tUsed)}</td><td>${a.tabSw||0}</td>
 <td><span class="badge ${a.passed?'pass':'fail'}">${a.passed?t('pass'):t('fail')}</span>${a.cheat?`<span class="cheatTag">CHEAT</span>`:''}</td>
 </tr>`;
 });
 c.innerHTML=h+'</tbody></table></div>';
}

function escapeHtmlSafe(s){ if(!s)return''; return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function saveExportUrls(){
 const egu=(document.getElementById('egu')||{value:''}).value.trim();
 const esu=(document.getElementById('esu')||{value:''}).value.trim();
 if(egu)localStorage.setItem('cch_export_gas_url',egu);
 if(esu)localStorage.setItem('cch_export_sheet_url',esu);
 toast(t('save')+' OK');
 setTimeout(()=>renderPage(),100);
}
function saveUrls(){
 const vals={
 cch_sheet_url:document.getElementById('su')?.value.trim()||'',
 cch_gas_url:document.getElementById('gu')?.value.trim()||'',
 cch_course_sheet_url:document.getElementById('csu')?.value.trim()||'',
 cch_course_gas_url:document.getElementById('cgu')?.value.trim()||''
 };
 Object.entries(vals).forEach(([k,v])=>{if(v)localStorage.setItem(k,v);});
 toast(t('save')+' OK');
 setTimeout(()=>renderPage(),100);
}

function getUrl(id){
 // try DOM first, then localStorage
 const el=document.getElementById(id);
 if(el&&el.value.trim())return el.value.trim();
 const map={gu:'cch_gas_url',cgu:'cch_course_gas_url',su:'cch_sheet_url',csu:'cch_course_sheet_url'};
 return localStorage.getItem(map[id])||'';
}

function setStatus(id,msg,show=true){
 const el=document.getElementById(id);
 if(!el)return;
 el.textContent=msg;el.style.display=show?'block':'none';
}

function doSyncStaff(){
 const url=getUrl('gu');
 if(!url){toast(t('field_required'));return;}
 localStorage.setItem('cch_gas_url',url);
 setStatus('staffSyncStatus',t('syncing'));
 fetch(url)
 .then(r=>r.json())
 .then(rows=>{
 const up={};
 rows.forEach(r=>{
 if(!r.username)return;
 up['users/'+r.username]={
 nameTH:r.nameTH||'',nameEN:r.nameEN||'',username:r.username,
 password:r.password||'1234',department:r.department||'',
 level:r.level||'1',role:r.role==='admin'?'admin':'staff',
 active:r.active!==false&&r.active!=='FALSE'
 };
 });
 return db.ref().update(up);
 })
 .then(()=>{
 db.ref('meta/lastStaffSync').set(firebase.database.ServerValue.TIMESTAMP);
 setStatus('staffSyncStatus',t('sync_done')+' ('+new Date().toLocaleTimeString()+')');
 toast(t('sync_done'));
 })
 .catch(e=>setStatus('staffSyncStatus','Error: '+e.message));
}

function doSyncCourses(){
 const url=getUrl('cgu');
 if(!url){toast(t('field_required'));return;}
 localStorage.setItem('cch_course_gas_url',url);
 setStatus('courseSyncStatus',t('syncing'));
 fetch(url)
 .then(r=>r.json())
 .then(rows=>{
 const dm={},cm={};
 rows.forEach((r,i)=>{
 if(!r.titleEN&&!r.titleTH)return;
 const dk=(r.deptNameEN||'General').replace(/[^a-zA-Z0-9]/g,'_');
 if(!dm[dk]){
 const ex=ST.departments[dk]||{};
 dm[dk]={nameTH:r.deptNameTH||dk,nameEN:r.deptNameEN||dk,icon:r.deptIcon||'',order:ex.order!==undefined?ex.order:Object.keys(dm).length};
 }
 const ck='sh_'+(r.titleEN||r.titleTH||'').replace(/[^a-zA-Z0-9]/g,'').toLowerCase().slice(0,16)+'_'+i;
 const rl=r.requiredLevel?String(r.requiredLevel).split(',').map(s=>s.trim()):['ALL'];
 // auto-extract drive id
 let did=r.driveFileId||'';
 const m=did.match(/\/d\/([a-zA-Z0-9_-]+)/);if(m)did=m[1];
 if(!cm[dk])cm[dk]={};
 cm[dk][ck]={titleTH:r.titleTH||r.titleEN||'',titleEN:r.titleEN||r.titleTH||'',driveFileId:did,durationSec:parseInt(r.durationSec)||600,requiredLevel:rl,requiredDept:[dk],order:Object.keys(cm[dk]).length,active:true};
 });
 const up={};
 Object.keys(dm).forEach(k=>{up['departments/'+k]=dm[k];});
 Object.keys(cm).forEach(dk=>{Object.keys(cm[dk]).forEach(ck=>{up['courses/'+dk+'/'+ck]=cm[dk][ck];});});
 return db.ref().update(up);
 })
 .then(()=>{
 db.ref('meta/lastCourseSync').set(firebase.database.ServerValue.TIMESTAMP);
 setStatus('courseSyncStatus',t('sync_done')+' ('+new Date().toLocaleTimeString()+')');
 toast(t('sync_done'));
 })
 .catch(e=>setStatus('courseSyncStatus','Error: '+e.message));
}

function buildExportRows(){
 const rows=[];
 Object.keys(ST.users).forEach(un=>{
 const u=ST.users[un]||{};
 const prog=ST.progress[un]||{};
 const logs=ST.examLogs[un]||{};
 const cids=new Set([...Object.keys(prog),...Object.keys(logs)]);
 if(!cids.size){
 rows.push({username:un,nameTH:u.nameTH||'',nameEN:u.nameEN||'',department:u.department||'',level:u.level||'',courseId:'',courseTH:'',courseEN:'',watchPct:0,examPassed:'',bestScore:'',attempts:0,tabSw:0,cheat:'',lastDate:''});
 return;
 }
 cids.forEach(cid=>{
 const c=findCourse(cid)||{};
 const p=prog[cid]||{};
 const atts=Object.values(logs[cid]||{}).sort((a,b)=>(b.ts||0)-(a.ts||0));
 const last=atts[0]||{};
 rows.push({username:un,nameTH:u.nameTH||'',nameEN:u.nameEN||'',department:u.department||'',level:u.level||'',courseId:cid,courseTH:c.titleTH||cid,courseEN:c.titleEN||cid,watchPct:Math.round(p.percent||0),examPassed:p.examPassed?'YES':'NO',bestScore:p.bestScore||0,attempts:atts.length,tabSw:last.tabSw||0,cheat:last.cheat?'YES':'NO',lastDate:last.ts?fmtDate(last.ts):''});
 });
 });
 return rows;
}
function exportCSV(){
 const rows=buildExportRows();
 if(!rows.length){toast('No data');return;}
 const h=Object.keys(rows[0]);
 const lines=[h.join(','),...rows.map(r=>h.map(k=>{const v=String(r[k]||'').replace(/"/g,'""');return v.includes(',')||v.includes('"')?`"${v}"`:v;}).join(','))];
 const blob=new Blob(['\uFEFF'+lines.join('\n')],{type:'text/csv;charset=utf-8;'});
 const url=URL.createObjectURL(blob);
 const a=document.createElement('a');a.href=url;a.download='CCH_Academy_'+new Date().toISOString().slice(0,10)+'.csv';
 a.click();URL.revokeObjectURL(url);
 toast('Download OK');
}
function sendToSheet(){
 const inputEl=document.getElementById('egu');
 if(inputEl&&inputEl.value.trim())localStorage.setItem('cch_export_gas_url',inputEl.value.trim());
 const url=localStorage.getItem('cch_export_gas_url')||'';
 if(!url){toast(LANG==='th'?'กรุณาใส่ Export Apps Script URL ก่อน':'Please enter Export Apps Script URL');return;}
 setStatus('exportStatus',t('syncing'),true);
 const rows=buildExportRows();
 if(!rows.length){toast(LANG==='th'?'ไม่มีข้อมูล':'No data');return;}
 fetch(url,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'export',rows})})
 .then(r=>r.json())
 .then(res=>{
 const msg=(LANG==='th'?'ส่งสำเร็จ '+rows.length+' รายการ':'Sent '+rows.length+' records')+' ('+new Date().toLocaleTimeString()+')';
 setStatus('exportStatus',msg,true);toast(msg);
 })
 .catch(()=>{
 exportCSV();
 setStatus('exportStatus',LANG==='th'?'CORS — ดาวน์โหลด CSV แทน':'CORS — downloaded as CSV',true);
 });
}

/* sync exam result realtime */
function syncExamResultToSheet(cid,score,passed,correct,total,tUsed,tabs,cheat){
 const url=localStorage.getItem('cch_export_gas_url')||localStorage.getItem('cch_gas_url')||'';
 if(!url)return;
 const row={username:ST.user.username,nameTH:ST.user.nameTH||'',nameEN:ST.user.nameEN||'',department:ST.user.department||'',level:ST.user.level||'',courseId:cid,score,passed:passed?'YES':'NO',correct,total,tUsed,tabs,cheat:cheat?'YES':'NO',ts:new Date().toLocaleString('th-TH')};
 fetch(url+(url.includes('?')?'&':'?')+'action=examResult',{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'examResult',row})}).catch(()=>{});
}

function showModal(html){
